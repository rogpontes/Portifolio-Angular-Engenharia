<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfólio - Angular Engenharia</title>
  <style>
    :root {
      --page-ratio: 210 / 297;
      --screen-width: min(96vw, 210mm);
      --bg: #e9e9e9;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.18);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .portfolio {
      width: 100%;
      padding: 20px 10px 48px;
    }

    .page {
      width: var(--screen-width);
      aspect-ratio: var(--page-ratio);
      margin: 0 auto 22px;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      page-break-after: always;
      break-after: page;
    }

    .page:last-child {
      page-break-after: auto;
      break-after: auto;
      margin-bottom: 0;
    }

    .page-1 { background-image: url('./assets/1.png'); }
    .page-2 { background-image: url('./assets/2.png'); }
    .page-3 { background-image: url('./assets/3.png'); }
    .page-4 { background-image: url('./assets/4.png'); }
    .page-5 { background-image: url('./assets/5.png'); }
    .page-6 { background-image: url('./assets/6.png'); }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      html, body {
        background: #fff;
      }

      .portfolio {
        padding: 0;
      }

      .page {
        width: 210mm;
        height: 297mm;
        aspect-ratio: auto;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <!--
    Modelo HTML fiel às imagens fornecidas.
    Para trocar qualquer página, substitua o arquivo correspondente na pasta /assets.
    Exemplo: assets/3.png altera a terceira página do portfólio.
  -->

  <main class="portfolio" aria-label="Portfólio Angular Engenharia">
    <section class="page page-1" aria-label="Capa do portfólio"></section>
    <section class="page page-2" aria-label="Apresentação institucional"></section>
    <section class="page page-3" aria-label="Nossos serviços"></section>
    <section class="page page-4" aria-label="Por que escolher nossa empresa"></section>
    <section class="page page-5" aria-label="Missão, visão e valores"></section>
    <section class="page page-6" aria-label="Cases e clientes"></section>
  </main>
</body>
</html>
